name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-code:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - uses: pnpm/action-setup@v5
      with:
        version: latest

    - name: Install Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 24.x
        cache: pnpm
        cache-dependency-path: |
          pnpm-lock.yaml
          src/webviews/pnpm-lock.yaml

    - name: Install Dependencies
      run: npx npm-run-all -l verify-deps:*

    - name: Lint Code
      run: pnpm run lint

    - name: Test Typings
      run: pnpm run test:typings
